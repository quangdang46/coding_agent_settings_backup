name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            suffix: linux-x86_64
            uses-cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            suffix: linux-aarch64
            uses-cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            suffix: macos-x86_64
            uses-cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            suffix: macos-aarch64
            uses-cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            suffix: windows-x86_64
            uses-cross: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.target }}"
          cross-targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.uses-cross
        run: cargo install cross
      - name: Build release
        run: |
          if [ "${{ matrix.uses-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
      - name: Package
        shell: bash
        run: |
          bin="${{ matrix.target }}/release/casb"
          [ "${{ matrix.runner }}" = "windows-latest" ] && bin="$bin.exe"
          
          mkdir -p dist
          if [ "${{ matrix.runner }}" = "windows-latest" ]; then
            cp "$bin" dist/casb.exe
            cd dist
            powershell -Command "Compress-Archive -Path casb.exe -DestinationPath ../casb-${{ matrix.suffix }}.zip -Force"
            cd ..
            rm dist/casb.exe
          else
            cp "$bin" dist/casb
            cd dist
            tar -czf ../casb-${{ matrix.suffix }}.tar.gz casb
            cd ..
            rm dist/casb
          fi
      - name: Compute checksum
        shell: bash
        run: |
          cd dist
          if [ "${{ matrix.runner }}" = "windows-latest" ]; then
            powershell -Command "(Get-FileHash -Path casb-${{ matrix.suffix }}.zip -Algorithm SHA256).Hash | ForEach-Object { $_ + '  casb-${{ matrix.suffix }}.zip' }" > casb-${{ matrix.suffix }}.zip.sha256
          else
            sha256sum casb-${{ matrix.suffix }}.tar.gz > casb-${{ matrix.suffix }}.tar.gz.sha256
          fi
          cd ..
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: casb-${{ matrix.suffix }}
          path: dist/*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: 'casb-*'
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: 'artifacts/*'
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

