name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            suffix: linux-x86_64
            uses-cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            suffix: linux-aarch64
            uses-cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            suffix: macos-x86_64
            uses-cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            suffix: macos-aarch64
            uses-cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            suffix: windows-x86_64
            uses-cross: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.target }}"
          cross-targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.uses-cross
        run: cargo install cross
      - name: Build release
        shell: bash
        run: |
          if [ "${{ matrix.uses-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
      - name: Package
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/casb"
          [ "${{ matrix.runner }}" = "windows-latest" ] && bin="$bin.exe"

          mkdir -p dist
          if [ "${{ matrix.runner }}" = "windows-latest" ]; then
            cp "$bin" dist/casb.exe
            cd dist
            powershell -Command "Compress-Archive -Path casb.exe -DestinationPath casb-${{ matrix.suffix }}.zip -Force"
            rm casb.exe
          else
            cp "$bin" dist/casb
            cd dist
            tar -czf casb-${{ matrix.suffix }}.tar.gz casb
            rm casb
          fi
      - name: Compute checksum
        shell: bash
        working-directory: dist
        run: |
          if [ "${{ matrix.runner }}" = "windows-latest" ]; then
            sha256sum casb-${{ matrix.suffix }}.zip > casb-${{ matrix.suffix }}.zip.sha256
          else
            sha256sum casb-${{ matrix.suffix }}.tar.gz > casb-${{ matrix.suffix }}.tar.gz.sha256
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: casb-${{ matrix.suffix }}
          path: dist/*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: 'casb-*'
          merge-multiple: true
      - name: List artifacts
        run: find artifacts -type f | sort
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            --verify-tag \
            $(find artifacts -type f | sort)

