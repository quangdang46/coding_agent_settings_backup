name: Release

on:
  push:
    tags: [v*]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-x86_64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-aarch64

          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: macos-x86_64

          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: macos-aarch64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation dependencies (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package archive (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          BIN_NAME="casb"
          ARCHIVE="casb-${{ github.ref_name }}-${{ matrix.suffix }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/$BIN_NAME" "dist/$BIN_NAME"
          cd dist
          tar czf "${ARCHIVE}.tar.gz" "$BIN_NAME"
          sha256sum "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"
          rm "$BIN_NAME"

      - name: Package archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          BIN_NAME="casb.exe"
          ARCHIVE="casb-${{ github.ref_name }}-${{ matrix.suffix }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/$BIN_NAME" "dist/$BIN_NAME"
          cd dist
          7z a -tzip "${ARCHIVE}.zip" "$BIN_NAME"
          sha256sum "${ARCHIVE}.zip" > "${ARCHIVE}.zip.sha256"
          rm "$BIN_NAME"

      - uses: actions/upload-artifact@v4
        with:
          name: casb-${{ matrix.suffix }}
          path: dist/casb-${{ github.ref_name }}-${{ matrix.suffix }}.*

  create-release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
